    </form>  
    
    
    
<script>
var vi=document.getElementById('ejemplo');   

function pantalla()
    {
        vi.requestFullscreen();
    }
     
function sonido_off()
    {
        vi.muted=true;
    }
    
function sonido_on()
    {
        vi.muted=false;
    }
    
function leer()
    {
        var cc=bb.numero.value; 
        velocidad(Number(cc));
    }
    
function velocidad(v)
    {
       vi.playbackRate=v; 
    }
</script>
